<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Playground</title>
  <style>
    :root {
      --bg: #07070f;
      --panel: rgba(8, 8, 22, 0.93);
      --border: rgba(255,255,255,0.08);
      --accent: #7c3aed;
      --text: #e2e8f0;
      --muted: #64748b;
      --btn-bg: rgba(255,255,255,0.05);
      --btn-active: rgba(124,58,237,0.45);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
      color: var(--text);
    }
    canvas { position: fixed; inset: 0; }

    /* ── Panel ── */
    #panel {
      position: fixed;
      top: 14px; right: 14px;
      width: 236px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: calc(100vh - 28px);
      overflow-y: auto;
      overflow-x: hidden;
    }
    #panel::-webkit-scrollbar { width: 3px; }
    #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    #hideBtn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      line-height: 1;
    }
    #hideBtn:hover { color: var(--text); }

    #showBtn {
      position: fixed;
      top: 14px; right: 14px;
      width: 36px; height: 36px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 9px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 11;
      font-size: 16px;
      backdrop-filter: blur(20px);
      color: var(--text);
    }

    .divider { height: 1px; background: var(--border); }

    .section { display: flex; flex-direction: column; gap: 7px; }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Buttons ── */
    .btn-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .btn {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--btn-bg);
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      font-family: inherit;
      line-height: 1;
    }
    .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.14); }
    .btn.active { background: var(--btn-active); border-color: rgba(124,58,237,0.55); color: #c4b5fd; }

    /* ── Sliders ── */
    .slider-row { display: flex; align-items: center; gap: 7px; }
    .slider-label { width: 38px; color: var(--muted); font-size: 11px; flex-shrink: 0; }
    .slider {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #7c3aed;
      border: 2px solid #a78bfa;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .slider-val {
      width: 32px;
      text-align: right;
      color: var(--muted);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* ── Color swatches ── */
    .color-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .swatch {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.active { border-color: #fff; }
    .swatch.rainbow { background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red); }
    .swatch.fire    { background: linear-gradient(135deg,#ff0000,#ff8c00,#ffd700); }
    .swatch.ocean   { background: linear-gradient(135deg,#0077b6,#00b4d8,#90e0ef); }
    .swatch.neon    { background: linear-gradient(135deg,#ff00ff,#00ffff,#7fff00); }

    #customHueRow { display: none; align-items: center; gap: 7px; }
    #customHueRow.visible { display: flex; }
    #hueSwatch {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<button id="showBtn" title="Show controls">⚙</button>

<div id="panel">
  <div class="panel-header">
    <span class="panel-title">Particle Playground</span>
    <button id="hideBtn">✕</button>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Effect</div>
    <div class="btn-row" id="modebtns">
      <button class="btn active" data-mode="drift">Drift</button>
      <button class="btn" data-mode="snow">Snow</button>
      <button class="btn" data-mode="burst">Burst</button>
      <button class="btn" data-mode="orbit">Orbit</button>
      <button class="btn" data-mode="stars">Stars</button>
      <button class="btn" data-mode="web">Web</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Particles</div>
    <div class="slider-row">
      <span class="slider-label">Count</span>
      <input class="slider" type="range" id="countSlider" min="10" max="500" value="200">
      <span class="slider-val" id="countVal">200</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Speed</span>
      <input class="slider" type="range" id="speedSlider" min="1" max="50" value="10">
      <span class="slider-val" id="speedVal">1.0</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Size</span>
      <input class="slider" type="range" id="sizeSlider" min="1" max="30" value="8">
      <span class="slider-val" id="sizeVal">4px</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Trail</span>
      <input class="slider" type="range" id="trailSlider" min="2" max="60" value="12">
      <span class="slider-val" id="trailVal">0.12</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Glow</span>
      <input class="slider" type="range" id="glowSlider" min="0" max="30" value="10">
      <span class="slider-val" id="glowVal">10px</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Color</div>
    <div class="color-row">
      <div class="swatch rainbow active" data-color="rainbow" title="Rainbow"></div>
      <div class="swatch fire"    data-color="fire"    title="Fire"></div>
      <div class="swatch ocean"   data-color="ocean"   title="Ocean"></div>
      <div class="swatch neon"    data-color="neon"    title="Neon"></div>
      <button class="btn" data-color="custom" style="padding:5px 8px">Custom</button>
    </div>
    <div class="slider-row" id="customHueRow">
      <div id="hueSwatch"></div>
      <input class="slider" type="range" id="hueSlider" min="0" max="359" value="220">
      <span class="slider-val" id="hueVal">220°</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Behavior</div>
    <div class="btn-row">
      <button class="btn" id="gravityBtn">Gravity: OFF</button>
    </div>
    <div class="section-label" style="margin-top:3px">Mouse / Touch</div>
    <div class="btn-row" id="mousebtns">
      <button class="btn" data-mouse="none">None</button>
      <button class="btn active" data-mouse="repel">Repel</button>
      <button class="btn" data-mouse="attract">Attract</button>
      <button class="btn" data-mouse="spawn">Spawn</button>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const cfg = {
  mode:      'drift',
  count:     200,
  speed:     1.0,
  size:      4,
  trail:     0.12,
  glow:      10,
  color:     'rainbow',
  customHue: 220,
  gravity:   false,
  mouse:     'repel',
  hueShift:  0,
};

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
window.addEventListener('resize', () => { resize(); particles.forEach(p => p.spawn()); });
resize();

// ── Pointer tracking ──────────────────────────────────────────────────────────
const ptr = { x: -9999, y: -9999, down: false };

function setPtr(x, y) { ptr.x = x; ptr.y = y; }
window.addEventListener('mousemove', e => setPtr(e.clientX, e.clientY));
window.addEventListener('mousedown', () => ptr.down = true);
window.addEventListener('mouseup',   () => ptr.down = false);
window.addEventListener('touchmove', e => {
  const t = e.touches[0]; setPtr(t.clientX, t.clientY);
}, { passive: true });
window.addEventListener('touchstart', e => {
  const t = e.touches[0]; setPtr(t.clientX, t.clientY); ptr.down = true;
}, { passive: true });
window.addEventListener('touchend', () => ptr.down = false);

// Block pointer events bleeding from panel into canvas
document.getElementById('panel').addEventListener('pointerdown', e => e.stopPropagation());
document.getElementById('panel').addEventListener('pointermove', e => e.stopPropagation());

// ── Helpers ───────────────────────────────────────────────────────────────────
const rand = (a, b) => a + Math.random() * (b - a);

function getHue(i) {
  const { color, customHue, hueShift } = cfg;
  if (color === 'rainbow') return (hueShift + i * 7) % 360;
  if (color === 'fire')    return rand(0, 45);
  if (color === 'ocean')   return rand(185, 215);
  if (color === 'neon')    return [300, 180, 130, 270][Math.floor(Math.random() * 4)];
  return customHue;
}

function particleColor(p) {
  const sat = cfg.color === 'fire' ? 100 : 88;
  let light = 62;
  if (cfg.color === 'fire') {
    const t = Math.min(p.age / (p.maxAge || 80), 1);
    light = 40 + (1 - t) * 40;
  }
  return `hsl(${p.hue},${sat}%,${light}%)`;
}

// ── Particle ──────────────────────────────────────────────────────────────────
class Particle {
  constructor(i) { this.i = i; this.spawn(); }

  spawn() {
    const m   = cfg.mode;
    this.age  = 0;
    this.hue  = getHue(this.i);
    this.sz   = rand(0.4, 1.5) * cfg.size;

    if (m === 'drift') {
      this.x   = rand(0, W); this.y = H + rand(0, 30);
      this.vx  = rand(-0.4, 0.4);
      this.vy  = -rand(0.6, 2.2) * cfg.speed;
      this.max = rand(100, 200);
    } else if (m === 'snow') {
      this.x   = rand(-20, W + 20); this.y = -rand(0, 20);
      this.vx  = rand(-0.6, 0.6);
      this.vy  = rand(0.4, 1.6) * cfg.speed;
      this.max = rand(160, 340);
    } else if (m === 'burst') {
      this.x   = cx; this.y = cy;
      const a  = rand(0, Math.PI * 2), s = rand(1, 4.5) * cfg.speed;
      this.vx  = Math.cos(a) * s; this.vy = Math.sin(a) * s;
      this.max = rand(45, 100);
    } else if (m === 'orbit') {
      this.r   = rand(60, Math.min(cx, cy) * 0.88);
      this.ang = rand(0, Math.PI * 2);
      this.spd = rand(0.007, 0.024) * cfg.speed * (Math.random() < 0.5 ? 1 : -1);
      this.x   = cx + Math.cos(this.ang) * this.r;
      this.y   = cy + Math.sin(this.ang) * this.r;
      this.vx  = this.vy = 0;
      this.max = Infinity;
    } else if (m === 'stars') {
      const a  = rand(0, Math.PI * 2);
      this.x   = cx + Math.cos(a) * rand(0, 4);
      this.y   = cy + Math.sin(a) * rand(0, 4);
      this.vx  = Math.cos(a) * 0.05 * cfg.speed;
      this.vy  = Math.sin(a) * 0.05 * cfg.speed;
      this.acc = 1.042;
      this.max = rand(55, 115);
    } else if (m === 'web') {
      this.x   = rand(0, W); this.y = rand(0, H);
      const a  = rand(0, Math.PI * 2), s = rand(0.2, 0.9) * cfg.speed;
      this.vx  = Math.cos(a) * s; this.vy = Math.sin(a) * s;
      this.max = Infinity;
    }
  }

  update() {
    const m = cfg.mode;

    if (m === 'orbit') {
      this.ang += this.spd;
      this.x = cx + Math.cos(this.ang) * this.r;
      this.y = cy + Math.sin(this.ang) * this.r;
    } else {
      if (m === 'stars') { this.vx *= this.acc; this.vy *= this.acc; }
      if (m === 'web') {
        if (this.x < 0 || this.x > W) this.vx *= -1;
        if (this.y < 0 || this.y > H) this.vy *= -1;
      }
      if (cfg.gravity) this.vy += 0.055;
      this.x += this.vx; this.y += this.vy;
    }

    // Mouse / touch force
    if (cfg.mouse === 'repel' || cfg.mouse === 'attract') {
      const dx = this.x - ptr.x, dy = this.y - ptr.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < 14400 && d2 > 0.5) {
        const d    = Math.sqrt(d2);
        const f    = ((120 - d) / 120) * 0.85;
        const sign = cfg.mouse === 'repel' ? 1 : -1;
        this.vx   += (dx / d) * f * sign;
        this.vy   += (dy / d) * f * sign;
        const mag  = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (mag > 7) { this.vx = (this.vx / mag) * 7; this.vy = (this.vy / mag) * 7; }
      }
    }

    if (cfg.color === 'rainbow') this.hue = (cfg.hueShift + this.i * 7 + this.age * 0.25) % 360;
    this.age++;

    const oob = this.x < -70 || this.x > W + 70 || this.y < -70 || this.y > H + 70;
    if (this.age >= this.max || oob) this.spawn();
  }

  draw() {
    const m = cfg.mode;
    let alpha = 1;

    if (this.max !== Infinity) {
      const t = this.age / this.max;
      if (m === 'burst' || m === 'stars') {
        alpha = 1 - t;
      } else if (m === 'drift') {
        alpha = Math.min(this.age / 15, 1) * (1 - Math.max(0, (t - 0.55) / 0.45));
      } else {
        alpha = Math.min(this.age / 10, 1) * (1 - t * 0.6);
      }
    } else {
      alpha = m === 'web' ? 0.8 : 1;
    }

    ctx.save();
    ctx.globalAlpha    = Math.max(0, alpha);
    ctx.fillStyle      = particleColor(this);
    ctx.shadowColor    = `hsl(${this.hue},100%,72%)`;
    ctx.shadowBlur     = cfg.glow;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.sz, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Pool ──────────────────────────────────────────────────────────────────────
let particles = [];

function syncCount() {
  while (particles.length < cfg.count) particles.push(new Particle(particles.length));
  if (particles.length > cfg.count) particles.length = cfg.count;
}
syncCount();

// ── Web lines ─────────────────────────────────────────────────────────────────
function drawWebLines() {
  const max = 110;
  ctx.save();
  ctx.lineWidth = 0.7;
  for (let i = 0; i < particles.length; i++) {
    const a = particles[i];
    for (let j = i + 1; j < particles.length; j++) {
      const b  = particles[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < max) {
        ctx.globalAlpha = (1 - d / max) * 0.35;
        ctx.strokeStyle = `hsl(${(a.hue + b.hue) / 2},80%,65%)`;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

// ── Spawn at pointer ──────────────────────────────────────────────────────────
let spawnTick = 0;

function spawnAtPointer() {
  if (!(cfg.mouse === 'spawn' && ptr.down)) return;
  if (++spawnTick % 2 !== 0) return;
  const p  = particles[Math.floor(Math.random() * particles.length)];
  const a  = rand(0, Math.PI * 2), s = rand(1, 3.5) * cfg.speed;
  p.x = ptr.x + rand(-8, 8); p.y = ptr.y + rand(-8, 8);
  p.vx = Math.cos(a) * s;    p.vy = Math.sin(a) * s;
  p.max = rand(35, 80);      p.age = 0;
  p.hue = getHue(p.i);       p.sz = rand(0.4, 1.5) * cfg.size;
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  cfg.hueShift = (cfg.hueShift + 0.35) % 360;

  spawnAtPointer();

  ctx.fillStyle = `rgba(7,7,15,${cfg.trail})`;
  ctx.fillRect(0, 0, W, H);

  if (cfg.mode === 'web') drawWebLines();

  for (const p of particles) { p.update(); p.draw(); }
}
requestAnimationFrame(loop);

// ── UI helpers ────────────────────────────────────────────────────────────────
function bindBtnGroup(id, prop, onChange) {
  const el = document.getElementById(id);
  el.querySelectorAll(`[data-${prop}]`).forEach(btn => {
    btn.addEventListener('click', () => {
      el.querySelectorAll(`[data-${prop}]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      cfg[prop] = btn.dataset[prop];
      onChange && onChange(cfg[prop]);
    });
  });
}

function bindSlider(sliderId, valId, prop, fromRaw, format) {
  const s = document.getElementById(sliderId);
  const v = document.getElementById(valId);
  s.addEventListener('input', () => {
    cfg[prop] = fromRaw(+s.value);
    v.textContent = format(cfg[prop]);
    if (prop === 'count') syncCount();
  });
}

// ── Wire controls ─────────────────────────────────────────────────────────────
bindBtnGroup('modebtns', 'mode', () => particles.forEach(p => p.spawn()));
bindBtnGroup('mousebtns', 'mouse');

bindSlider('countSlider', 'countVal', 'count', v => v,        v => v);
bindSlider('speedSlider', 'speedVal', 'speed', v => v / 10,   v => v.toFixed(1));
bindSlider('sizeSlider',  'sizeVal',  'size',  v => v / 2,    v => v.toFixed(1) + 'px');
bindSlider('trailSlider', 'trailVal', 'trail', v => v / 100,  v => v.toFixed(2));
bindSlider('glowSlider',  'glowVal',  'glow',  v => v,        v => v + 'px');

// Color swatches
const swatches    = [...document.querySelectorAll('[data-color]')];
const customHueRow = document.getElementById('customHueRow');
swatches.forEach(s => {
  s.addEventListener('click', () => {
    swatches.forEach(b => b.classList.remove('active'));
    s.classList.add('active');
    cfg.color = s.dataset.color;
    customHueRow.classList.toggle('visible', cfg.color === 'custom');
  });
});

// Hue slider
const hueSlider = document.getElementById('hueSlider');
const hueSwatch = document.getElementById('hueSwatch');
const hueValEl  = document.getElementById('hueVal');
function refreshHue() {
  cfg.customHue              = +hueSlider.value;
  hueValEl.textContent       = cfg.customHue + '°';
  hueSwatch.style.background = `hsl(${cfg.customHue},90%,65%)`;
}
hueSlider.addEventListener('input', refreshHue);
refreshHue();

// Gravity
const gravBtn = document.getElementById('gravityBtn');
gravBtn.addEventListener('click', () => {
  cfg.gravity = !cfg.gravity;
  gravBtn.textContent = 'Gravity: ' + (cfg.gravity ? 'ON' : 'OFF');
  gravBtn.classList.toggle('active', cfg.gravity);
});

// Panel hide / show
const panel   = document.getElementById('panel');
const showBtn = document.getElementById('showBtn');
document.getElementById('hideBtn').addEventListener('click', () => {
  panel.style.display   = 'none';
  showBtn.style.display = 'flex';
});
showBtn.addEventListener('click', () => {
  panel.style.display   = 'flex';
  showBtn.style.display = 'none';
});
</script>
</body>
</html>
