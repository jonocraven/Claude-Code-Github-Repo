<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jono Craven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
    }

    .scene {
      position: relative;
      text-align: center;
    }

    .glow-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(99, 51, 255, 0.15) 0%,
        rgba(99, 51, 255, 0.05) 40%,
        transparent 70%);
      filter: blur(20px);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50%       { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    .name {
      position: relative;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 18vw, 14rem);
      letter-spacing: 0.08em;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 0%, #c084fc 40%, #6333ff 80%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(99, 51, 255, 0.6));
      animation: shimmer 6s linear infinite;
      background-size: 200% 200%;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .subtitle {
      position: relative;
      margin-top: 0.4em;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: rgba(192, 132, 252, 0.7);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(192, 132, 252, 0.6);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="scene">
    <div class="glow-ring"></div>
    <h1 class="name">Jono Craven</h1>
    <p class="subtitle">welcome</p>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
      container.appendChild(p);
    }
  </script>

</body>
</html>
